name: DevFlow AI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore DevFlowAI.sln

      - name: Build solution
        run: dotnet build DevFlowAI.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test DevFlowAI.sln --configuration Release --no-build --verbosity normal

      - name: Build Docker image
        run: docker build -f DevFlowAI.API/Dockerfile -t devflow-api .

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image to GHCR
        if: github.event_name == 'push'
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/devflow-api
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')

          docker build -f DevFlowAI.API/Dockerfile -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}