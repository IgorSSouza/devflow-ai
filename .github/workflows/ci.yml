name: DevFlow AI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore DevFlowAI.sln

      - name: Build solution
        run: dotnet build DevFlowAI.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test DevFlowAI.sln --configuration Release --no-build --verbosity normal